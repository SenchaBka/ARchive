<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Tube Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 16px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 180, 255, 0.8);
        }

        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        #reset-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 25px rgba(79, 172, 254, 0.6);
        }

        #reset-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="info">Click on the tube to explode particles</div>
    <button id="reset-btn">Reset Tube</button>
    <canvas id="webglCanvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const canvas = document.getElementById('webglCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a0f, 1);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Particle system parameters
        const PARTICLE_COUNT = 25000;
        const TUBE_RADIUS = 0.6;
        const TUBE_HEIGHT = 8;

        // Create light beam texture
        function createLightBeamTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Vertical gradient for light beam effect - brighter
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(200, 230, 255, 0.05)');
            gradient.addColorStop(0.1, 'rgba(180, 220, 255, 0.2)');
            gradient.addColorStop(0.5, 'rgba(200, 230, 255, 0.35)');
            gradient.addColorStop(0.9, 'rgba(180, 220, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(200, 230, 255, 0.05)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add vertical light streaks - more and brighter
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 15; i++) {
                const x = Math.random() * canvas.width;
                const width = 5 + Math.random() * 20;
                const streakGradient = ctx.createLinearGradient(x, 0, x, canvas.height);
                streakGradient.addColorStop(0, 'rgba(255, 255, 255, 0.05)');
                streakGradient.addColorStop(0.2, 'rgba(200, 240, 255, 0.2)');
                streakGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
                streakGradient.addColorStop(0.8, 'rgba(200, 240, 255, 0.2)');
                streakGradient.addColorStop(1, 'rgba(255, 255, 255, 0.05)');
                
                ctx.fillStyle = streakGradient;
                ctx.fillRect(x - width/2, 0, width, canvas.height);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            return texture;
        }

        // Create inner cylinder mesh with light beam texture
        const cylinderGeometry = new THREE.CylinderGeometry(TUBE_RADIUS - 0.05, TUBE_RADIUS - 0.05, TUBE_HEIGHT, 32, 1, true);
        const lightBeamTexture = createLightBeamTexture();
        const cylinderMaterial = new THREE.MeshBasicMaterial({
            map: lightBeamTexture,
            color: 0x88ccff,
            transparent: true,
            opacity: 0.35,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const innerCylinder = new THREE.Mesh(cylinderGeometry, cylinderMaterial);
        scene.add(innerCylinder);

        // Add outer glow cylinder
        const glowCylinderGeometry = new THREE.CylinderGeometry(TUBE_RADIUS + 0.15, TUBE_RADIUS + 0.15, TUBE_HEIGHT, 32, 1, true);
        const glowCylinderMaterial = new THREE.MeshBasicMaterial({
            color: 0xaaddff,
            transparent: true,
            opacity: 0.1,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const glowCylinder = new THREE.Mesh(glowCylinderGeometry, glowCylinderMaterial);
        scene.add(glowCylinder);

        // Add point lights inside the tube to make it a light source
        const tubeLight1 = new THREE.PointLight(0x88ccff, 3, 15);
        tubeLight1.position.set(0, TUBE_HEIGHT * 0.3, 0);
        scene.add(tubeLight1);

        const tubeLight2 = new THREE.PointLight(0x88ccff, 3, 15);
        tubeLight2.position.set(0, -TUBE_HEIGHT * 0.3, 0);
        scene.add(tubeLight2);

        const tubeLight3 = new THREE.PointLight(0xaaddff, 2, 12);
        tubeLight3.position.set(0, 0, 0);
        scene.add(tubeLight3);

        // Add a floor to show the light effect
        const floorGeometry = new THREE.PlaneGeometry(30, 30);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x111122,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -TUBE_HEIGHT / 2 - 0.1;
        scene.add(floor);

        // Add ambient light (very dim)
        const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
        scene.add(ambientLight);


        // Create particle geometry
        let geometry = new THREE.BufferGeometry();
        let positions = new Float32Array(PARTICLE_COUNT * 3);
        let colors = new Float32Array(PARTICLE_COUNT * 3);
        let sizes = new Float32Array(PARTICLE_COUNT);
        let velocities = new Float32Array(PARTICLE_COUNT * 3);
        let originalPositions = new Float32Array(PARTICLE_COUNT * 3);
        let alphas = new Float32Array(PARTICLE_COUNT);

        // Initialize particles in tube shape
        function initTubeParticles() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = TUBE_RADIUS + (Math.random() - 0.5) * 0.1;
                const height = (Math.random() - 0.5) * TUBE_HEIGHT;

                const x = Math.cos(angle) * radius;
                const y = height;
                const z = Math.sin(angle) * radius;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                originalPositions[i * 3] = x;
                originalPositions[i * 3 + 1] = y;
                originalPositions[i * 3 + 2] = z;

                // Light blue colors with slight variation based on height
                const t = (height + TUBE_HEIGHT / 2) / TUBE_HEIGHT;
                colors[i * 3] = 0.4 + t * 0.2; // R (slight hint)
                colors[i * 3 + 1] = 0.7 + t * 0.2; // G
                colors[i * 3 + 2] = 1.0; // B (full blue)

                sizes[i] = Math.random() * 0.025 + 0.015;
                alphas[i] = 0.7 + Math.random() * 0.3;

                // Initialize velocities to zero
                velocities[i * 3] = 0;
                velocities[i * 3 + 1] = 0;
                velocities[i * 3 + 2] = 0;
            }
        }

        initTubeParticles();

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

        // Custom shader material for particles
        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                pointTexture: { value: createParticleTexture() }
            },
            vertexShader: `
                attribute float size;
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vColor = color;
                    vAlpha = alpha;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vec4 texColor = texture2D(pointTexture, gl_PointCoord);
                    if (texColor.a < 0.1) discard;
                    gl_FragColor = vec4(vColor, texColor.a * vAlpha);
                }
            `,
            transparent: true,
            vertexColors: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        // Create particle texture
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(150, 220, 255, 0.8)');
            gradient.addColorStop(0.6, 'rgba(100, 180, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(50, 150, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const particles = new THREE.Points(geometry, particleMaterial);
        scene.add(particles);

        // Raycaster for click detection
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.5;
        const mouse = new THREE.Vector2();

        // Animation state
        let isExploding = false;
        let explosionProgress = 0;
        const EXPLOSION_DURATION = 0.8; // seconds

        // Handle click
        function onClick(event) {
            if (isExploding) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Check both particles and cylinder for clicks
            const particleIntersects = raycaster.intersectObject(particles);
            const cylinderIntersects = raycaster.intersectObject(innerCylinder);

            if (particleIntersects.length > 0 || cylinderIntersects.length > 0) {
                startExplosion();
            }
        }

        function startExplosion() {
            isExploding = true;
            explosionProgress = 0;
            document.getElementById('info').textContent = 'Exploding...';

            // Calculate velocities for each particle (outward from center)
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const x = positions[i * 3];
                const y = positions[i * 3 + 1];
                const z = positions[i * 3 + 2];

                // Direction from center
                const dx = x;
                const dy = y * 0.3; // Less vertical movement
                const dz = z;
                
                const length = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                // Randomize speed - faster explosion
                const speed = 4 + Math.random() * 5;
                
                velocities[i * 3] = (dx / length) * speed + (Math.random() - 0.5) * 0.5;
                velocities[i * 3 + 1] = (dy / length) * speed + Math.random() * 1.5;
                velocities[i * 3 + 2] = (dz / length) * speed + (Math.random() - 0.5) * 0.5;
            }
        }

        function resetTube() {
            isExploding = false;
            explosionProgress = 0;
            initTubeParticles();
            
            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
            geometry.attributes.size.needsUpdate = true;
            geometry.attributes.alpha.needsUpdate = true;
            
            // Reset cylinder visibility
            cylinderMaterial.opacity = 0.35;
            glowCylinderMaterial.opacity = 0.1;
            innerCylinder.visible = true;
            glowCylinder.visible = true;
            innerCylinder.scale.set(1, 1, 1);
            glowCylinder.scale.set(1, 1, 1);
            
            // Reset lights
            tubeLight1.intensity = 3;
            tubeLight2.intensity = 3;
            tubeLight3.intensity = 2;
            
            document.getElementById('info').textContent = 'Click on the tube to explode particles';
        }

        canvas.addEventListener('click', onClick);
        document.getElementById('reset-btn').addEventListener('click', resetTube);

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            particleMaterial.uniforms.time.value += delta;

            if (isExploding) {
                explosionProgress += delta;
                
                const progress = Math.min(explosionProgress / EXPLOSION_DURATION, 1);
                
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    // Update positions based on velocity
                    positions[i * 3] += velocities[i * 3] * delta;
                    positions[i * 3 + 1] += velocities[i * 3 + 1] * delta;
                    positions[i * 3 + 2] += velocities[i * 3 + 2] * delta;
                    
                    // Add gravity
                    velocities[i * 3 + 1] -= 2 * delta;
                    
                    // Fade out
                    alphas[i] = Math.max(0, 1 - progress);
                    
                    // Shrink particles faster
                    sizes[i] *= 0.98;
                }
                
                geometry.attributes.position.needsUpdate = true;
                geometry.attributes.alpha.needsUpdate = true;
                geometry.attributes.size.needsUpdate = true;
                
                // Fade and expand the inner cylinders - fast fade
                cylinderMaterial.opacity = Math.max(0, 0.35 * (1 - progress * 2.5));
                glowCylinderMaterial.opacity = Math.max(0, 0.1 * (1 - progress * 2.5));
                
                // Fade out lights
                tubeLight1.intensity = Math.max(0, 3 * (1 - progress * 2));
                tubeLight2.intensity = Math.max(0, 3 * (1 - progress * 2));
                tubeLight3.intensity = Math.max(0, 2 * (1 - progress * 2));
                
                // Expand outward as it fades
                const scale = 1 + progress * 1.2;
                innerCylinder.scale.set(scale, 1, scale);
                glowCylinder.scale.set(scale, 1, scale);
                
                if (progress >= 0.4) {
                    innerCylinder.visible = false;
                    glowCylinder.visible = false;
                }
                
                if (progress >= 1) {
                    document.getElementById('info').textContent = 'Click Reset to try again';
                }
            } else {
                // Idle animation - gentle wave
                const time = particleMaterial.uniforms.time.value;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const originalY = originalPositions[i * 3 + 1];
                    const originalX = originalPositions[i * 3];
                    const originalZ = originalPositions[i * 3 + 2];
                    
                    // Subtle wave effect
                    const wave = Math.sin(time * 2 + originalY * 2) * 0.02;
                    positions[i * 3] = originalX + wave;
                    positions[i * 3 + 2] = originalZ + wave;
                }
                geometry.attributes.position.needsUpdate = true;
                
                // Animate light beam - subtle pulsing
                const pulse = Math.sin(time * 3) * 0.05 + 1;
                cylinderMaterial.opacity = 0.3 + Math.sin(time * 2) * 0.05;
                innerCylinder.scale.set(pulse, 1, pulse);
                
                // Pulsing lights
                const lightPulse = Math.sin(time * 4) * 0.5 + 1;
                tubeLight1.intensity = 2.5 + lightPulse;
                tubeLight2.intensity = 2.5 + lightPulse;
                tubeLight3.intensity = 1.5 + lightPulse * 0.5;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
